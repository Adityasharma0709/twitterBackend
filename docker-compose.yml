version: '3.8'

services:
  # --- DATABASE SERVICE ---
  db:
    image: postgres:15-alpine
    container_name: dev_express_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: tweet
    ports:
      - "5432:5432"
    volumes:
      # Persists database data on the host machine so it's not lost when the container stops
      - postgres_data:/var/lib/postgresql/data
      # Automatically initializes the schema on first run using our sql script
      - ./script.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      # Checks if postgres is ready to accept connections
      test: ["CMD-SHELL", "pg_isready -U postgres -d tweet"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- WEB SERVER SERVICE ---
  web:
    build: .
    container_name: dev_express_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      # We reference the database container's service name ("db") as the host
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: root
      DB_NAME: tweet
      DB_PORT: 5432
      JWT_SECRET: mysecretkey
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
